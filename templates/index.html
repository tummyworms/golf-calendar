<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pittsburgh Golf Outings</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --black:   #0d0d0b;
      --white:   #ffffff;
      --surface: #f6f6f4;
      --border:  #e6e6e2;
      --muted:   #888882;
      --text:    #1c1c1a;
      --green:   #1b4332;
      --green2:  #2d6a4f;
      --gold:    #9a7000;
      --red:     #a02020;
      --blue:    #1a3a6b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--surface);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      color: var(--white);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .header-left h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-left span {
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.03em;
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Zip input ── */
    .zip-group {
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 2px;
      padding: 4px 10px;
    }

    .zip-group label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }

    .zip-group input {
      width: 52px;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.04em;
      text-align: center;
    }

    .zip-group input::placeholder { color: rgba(255,255,255,0.3); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border: 1px solid transparent;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      font-family: inherit;
      line-height: 1;
      white-space: nowrap;
    }

    .btn-primary   { background: var(--white); color: var(--black); border-color: var(--white); }
    .btn-primary:hover { background: rgba(255,255,255,0.85); }

    .btn-outline   { background: transparent; color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.22); }
    .btn-outline:hover { color: var(--white); border-color: rgba(255,255,255,0.55); }

    .btn-dark      { background: var(--black); color: var(--white); border-color: var(--black); }
    .btn-dark:hover { background: #2a2a28; border-color: #2a2a28; }

    .btn-green     { background: var(--green); color: var(--white); border-color: var(--green); }
    .btn-green:hover { background: var(--green2); border-color: var(--green2); }

    .btn-ghost     { background: transparent; color: var(--text); border-color: var(--border); }
    .btn-ghost:hover { background: var(--surface); }

    .btn-danger    { background: transparent; color: var(--red); border-color: var(--red); }
    .btn-danger:hover { background: var(--red); color: var(--white); }

    .btn-sm { padding: 4px 10px; font-size: 10px; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding: 0 6px;
    }

    .tab-btn {
      flex: 1;
      padding: 13px 0 11px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }

    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ── Search ── */
    .list-search {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .list-search input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 12px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.12s, background 0.12s;
    }

    .list-search input:focus { border-color: var(--text); background: var(--white); }
    .list-search input::placeholder { color: var(--muted); }

    .scroll-list { overflow-y: auto; flex: 1; }

    /* ── Event rows ── */
    .event-row {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .event-row:hover { background: var(--surface); }
    .event-row:last-child { border-bottom: none; }

    .event-row-date {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .event-row-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .event-row-course {
      font-size: 11px;
      color: var(--muted);
    }

    .event-row-actions {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ── Tags ── */
    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 1px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .tag-butlers    { background: #eef0f8; color: #2c3580; }
    .tag-3lakes     { background: #e8f5f7; color: #0a5460; }
    .tag-eventbrite { background: #fdf0f5; color: #7a0a35; }
    .tag-pgt        { background: #fdf6e8; color: #8a5000; }
    .tag-manual     { background: #f0edf8; color: #3d1f80; }

    /* ── Course rows ── */
    .course-row {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .course-row:last-child { border-bottom: none; }

    .course-row h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .course-row .course-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .course-row .course-actions { display: flex; gap: 6px; }

    /* ── Add form ── */
    .add-form {
      overflow-y: auto;
      flex: 1;
      padding: 16px 14px;
    }

    .add-form h3 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 12px; }

    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 12px;
      font-family: inherit;
      background: var(--white);
      color: var(--text);
      outline: none;
      transition: border-color 0.12s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--text); }

    .form-group textarea { resize: vertical; min-height: 64px; }

    .form-submit {
      width: 100%;
      padding: 9px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.12s;
    }

    .form-submit:hover { background: #2a2a28; }

    /* ── Main area ── */
    .main-area { display: flex; flex-direction: column; overflow: hidden; }

    .view-bar {
      padding: 0 14px;
      height: 44px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 2px;
      align-items: center;
      flex-shrink: 0;
    }

    .view-btn {
      padding: 5px 11px;
      background: none;
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.12s, background 0.12s;
    }

    .view-btn:hover { color: var(--text); background: var(--surface); }
    .view-btn.active { color: var(--text); background: var(--surface); }

    .view-bar .divider { width: 1px; height: 14px; background: var(--border); margin: 0 6px; }
    .view-bar .spacer  { flex: 1; }
    .view-bar .status  { font-size: 11px; color: var(--muted); }

    /* ── Calendar / Map ── */
    #calendar-view { flex: 1; overflow: auto; padding: 20px; background: var(--white); }
    #calendar      { min-height: 400px; }
    #map-view      { flex: 1; display: none; }
    #map           { height: 100%; width: 100%; }

    /* ── FullCalendar overrides ── */
    .fc { font-family: inherit !important; }

    .fc th {
      font-size: 10px !important;
      font-weight: 600 !important;
      letter-spacing: 0.07em !important;
      text-transform: uppercase !important;
    }

    .fc-event {
      cursor: pointer;
      border-radius: 2px !important;
      padding: 1px 5px !important;
      font-size: 11px !important;
      font-weight: 500 !important;
    }

    .fc-event-butlers    { background: var(--green)  !important; border-color: var(--green)  !important; }
    .fc-event-manual     { background: #3d1f80       !important; border-color: #2a1060       !important; }
    .fc-event-tournament { background: var(--gold)   !important; border-color: #7a5500       !important; }

    .fc-button {
      border-radius: 2px !important;
      font-family: inherit !important;
      font-size: 10px !important;
      font-weight: 600 !important;
      letter-spacing: 0.07em !important;
      text-transform: uppercase !important;
    }

    .fc-button-primary                               { background: var(--black) !important; border-color: var(--black) !important; }
    .fc-button-primary:hover                         { background: #2a2a28     !important; }
    .fc-button-primary:not(:disabled):active         { background: #2a2a28     !important; }
    .fc-button-primary.fc-button-active              { background: #2a2a28     !important; }
    .fc-today-button                                 { opacity: 0.55            !important; }
    .fc-daygrid-day-number                           { font-size: 11px         !important; }
    .fc-col-header-cell-cushion                      { font-size: 10px         !important; letter-spacing: 0.07em !important; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,13,11,0.52);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 2px;
      padding: 32px;
      max-width: 480px;
      width: 92%;
      box-shadow: 0 8px 48px rgba(0,0,0,0.16);
      position: relative;
      max-height: 88vh;
      overflow-y: auto;
    }

    .modal-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green2);
      margin-bottom: 8px;
    }

    .modal h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--black);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .modal .m-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal .m-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 20px;
    }

    .modal .m-note {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      padding: 10px 12px;
      background: var(--surface);
      border-left: 2px solid var(--border);
      margin-bottom: 20px;
    }

    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 4px;
      transition: color 0.12s;
    }

    .modal-close:hover { color: var(--text); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--black);
      color: var(--white);
      padding: 10px 16px;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 500;
      z-index: 2000;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Map popup ── */
    .map-popup h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--black); }
    .map-popup p  { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .map-popup a  {
      display: inline-block;
      padding: 4px 10px;
      background: var(--green);
      color: var(--white);
      border-radius: 2px;
      text-decoration: none;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-right: 4px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Pittsburgh Golf</h1>
    <span>15239 Area &middot; Outings &amp; Tee Times</span>
  </div>
  <div class="header-actions">
    <div class="zip-group" title="ZIP code used for GolfNow tee time searches">
      <label for="zipInput">Near</label>
      <input type="text" id="zipInput" maxlength="5" placeholder="ZIP" inputmode="numeric"
             onchange="setZip(this.value)" onblur="setZip(this.value)"/>
      <label>PA</label>
    </div>
    <button class="btn btn-outline" id="scrapeBtn" onclick="runScrape()">&#8635; Refresh</button>
    <button class="btn btn-primary" onclick="openTab('add')">+ Add Event</button>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="openTab('events')">Events</button>
      <button class="tab-btn"        onclick="openTab('upcoming')">Upcoming</button>
      <button class="tab-btn"        onclick="openTab('courses')">Courses</button>
      <button class="tab-btn"        onclick="openTab('add')">Add</button>
    </div>

    <!-- Events tab -->
    <div class="tab-panel active" id="tab-events">
      <div class="list-search">
        <input id="evSearch" placeholder="Search events" oninput="filterEvents()"/>
      </div>
      <div class="scroll-list" id="eventList">
        <div class="empty-state">Loading&hellip;</div>
      </div>
    </div>

    <!-- Upcoming tab -->
    <div class="tab-panel" id="tab-upcoming">
      <div class="list-search">
        <input id="upSearch" placeholder="Search upcoming" oninput="filterUpcoming()"/>
      </div>
      <div class="scroll-list" id="upcomingList">
        <div class="empty-state">Loading&hellip;</div>
      </div>
    </div>

    <!-- Courses tab -->
    <div class="tab-panel" id="tab-courses">
      <div class="scroll-list" id="coursesList"></div>
    </div>

    <!-- Add tab -->
    <div class="tab-panel" id="tab-add">
      <div class="add-form">
        <h3>Add a Golf Outing</h3>
        <form id="addForm" onsubmit="submitEvent(event)">
          <div class="form-group">
            <label>Event Title *</label>
            <input type="text" name="title" required placeholder="Annual Charity Scramble"/>
          </div>
          <div class="form-group">
            <label>Course Name *</label>
            <input type="text" name="course" required placeholder="3 Lakes Golf Course" list="courseSuggestions"/>
            <datalist id="courseSuggestions"></datalist>
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" placeholder="123 Golf Rd, Pittsburgh, PA"/>
          </div>
          <div class="form-group">
            <label>Date *</label>
            <input type="date" name="date" required/>
          </div>
          <div class="form-group">
            <label>Tee Time / Start</label>
            <input type="text" name="time" placeholder="8:00 AM Shotgun"/>
          </div>
          <div class="form-group">
            <label>Type</label>
            <select name="type">
              <option value="outing">Outing / Scramble</option>
              <option value="tournament">Tournament</option>
            </select>
          </div>
          <div class="form-group">
            <label>Event URL</label>
            <input type="url" name="event_url" placeholder="https://"/>
          </div>
          <div class="form-group">
            <label>Tee Time Booking URL</label>
            <input type="url" name="tee_time_url" placeholder="https://"/>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="Format, cost, details&hellip;"></textarea>
          </div>
          <button type="submit" class="form-submit">Save Event</button>
        </form>
      </div>
    </div>
  </aside>

  <div class="main-area">
    <div class="view-bar">
      <button class="view-btn active" id="viewCalBtn" onclick="showView('calendar')">Calendar</button>
      <button class="view-btn"        id="viewMapBtn" onclick="showView('map')">Map</button>
      <div class="divider"></div>
      <button class="view-btn" onclick="calendar.changeView('dayGridMonth')">Month</button>
      <button class="view-btn" onclick="calendar.changeView('listMonth')">List</button>
      <button class="view-btn" onclick="calendar.changeView('dayGridWeek')">Week</button>
      <div class="spacer"></div>
      <span class="status" id="viewStatus"></span>
    </div>

    <div id="calendar-view">
      <div id="calendar"></div>
    </div>
    <div id="map-view">
      <div id="map"></div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="eventModal" onclick="closeModalBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div class="modal-eyebrow" id="m-eyebrow"></div>
    <h2 id="m-title"></h2>
    <div class="m-meta" id="m-meta"></div>
    <div class="m-desc" id="m-desc"></div>
    <div class="m-note" id="m-note" style="display:none"></div>
    <div class="modal-actions" id="m-actions"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let allEvents   = [];
let allUpcoming = [];
let calendar;
let leafletMap;
let userZip = localStorage.getItem('golf_zip') || '15239';

document.addEventListener("DOMContentLoaded", () => {
  document.querySelector('[name="date"]').value = new Date().toISOString().split("T")[0];
  document.getElementById("zipInput").value = userZip;
  initCalendar();
  loadAll();
});

// ── Zip / booking URL helpers ─────────────────────────────────────────────────
function setZip(val) {
  const z = val.trim().replace(/\D/g, '').slice(0, 5);
  if (!z) return;
  userZip = z;
  document.getElementById("zipInput").value = z;
  localStorage.setItem('golf_zip', z);
  // re-render so all booking links pick up new zip
  renderEventList(allEvents);
  renderUpcomingList(allUpcoming);
}

// Returns a date-specific booking URL for known platforms,
// falls back to a GolfNow zip+date search for everything else.
function bookingUrl(teeTimeUrl, date) {
  const fallback = `https://www.golfnow.com/tee-times?postalCode=${encodeURIComponent(userZip)}${date ? '&date=' + fmtGolfNow(date) : ''}`;

  if (!teeTimeUrl) return fallback;

  try {
    const u = new URL(teeTimeUrl);
    const h = u.hostname;

    // GolfNow facility search  →  ?date=MM/DD/YYYY
    if (h.includes('golfnow.com')) {
      if (date) u.searchParams.set('date', fmtGolfNow(date));
      // For the generic courses detail page, switch to the search endpoint
      if (u.pathname.includes('/courses/')) {
        const id = u.pathname.match(/\/courses\/(\d+)/)?.[1];
        const base = id
          ? `https://www.golfnow.com/tee-times/facility/${id}/search`
          : `https://www.golfnow.com/tee-times`;
        const nu = new URL(base);
        if (date) nu.searchParams.set('date', fmtGolfNow(date));
        nu.searchParams.set('postalCode', userZip);
        return nu.toString();
      }
      return u.toString();
    }

    // Chronogolf  →  ?date=YYYY-MM-DD
    if (h.includes('chronogolf.com')) {
      if (date) u.searchParams.set('date', date);
      return u.toString();
    }

    // TeeItUp  →  ?date=YYYY-MM-DD
    if (h.includes('teeitup.com')) {
      if (date) u.searchParams.set('date', date);
      return u.toString();
    }

    // Unknown booking platform — keep direct URL as primary, but caller can
    // also show a GolfNow fallback via bookingFallback()
    return teeTimeUrl;

  } catch(e) {
    return teeTimeUrl || fallback;
  }
}

// Returns true when the platform is unknown (direct course website)
// so callers can offer a secondary GolfNow search link.
function needsFallback(teeTimeUrl) {
  if (!teeTimeUrl) return true;
  try {
    const h = new URL(teeTimeUrl).hostname;
    return !h.includes('golfnow.com') && !h.includes('chronogolf.com') && !h.includes('teeitup.com');
  } catch(e) { return true; }
}

function fmtGolfNow(iso) {
  // GolfNow expects MM/DD/YYYY
  if (!iso) return '';
  const [yyyy, mm, dd] = iso.split('-');
  return `${mm}/${dd}/${yyyy}`;
}

function golfNowSearch(date) {
  return `https://www.golfnow.com/tee-times?postalCode=${encodeURIComponent(userZip)}${date ? '&date=' + fmtGolfNow(date) : ''}`;
}

async function loadAll() {
  await Promise.all([loadEvents(), loadUpcoming(), loadCourses()]);
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function initCalendar() {
  calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
    initialView: "dayGridMonth",
    height: "100%",
    headerToolbar: { left: "prev,next today", center: "title", right: "" },
    events: [],
    eventClick(info) {
      const ev = allEvents.find(e => String(e.id) === info.event.id);
      if (ev) showModal(ev, false);
    },
    eventClassNames(arg) {
      const src = arg.event.extendedProps.source || "";
      if (src === "manual") return ["fc-event-manual"];
      if ((arg.event.extendedProps.type || "") === "tournament") return ["fc-event-tournament"];
      return ["fc-event-butlers"];
    },
  });
  calendar.render();
}

// ── Map ───────────────────────────────────────────────────────────────────────
function initMap(courses) {
  if (leafletMap) return;
  leafletMap = L.map("map").setView([40.43, -79.80], 11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(leafletMap);

  const icon = L.divIcon({
    html: '<div style="background:#1b4332;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35)"></div>',
    className: "",
    iconSize: [12, 12],
    iconAnchor: [6, 6],
  });

  courses.forEach(c => {
    if (!c.lat || !c.lng) return;
    const popup = `
      <div class="map-popup">
        <h4>${esc(c.name)}</h4>
        <p>${esc(c.address)}</p>
        ${c.phone ? `<p>${esc(c.phone)}</p>` : ""}
        <div>
          ${c.tee_time_url ? `<a href="${esc(c.tee_time_url)}" target="_blank">Book Tee Time</a>` : ""}
          ${c.website && c.website !== c.tee_time_url ? `<a href="${esc(c.website)}" target="_blank" style="background:#2d6a4f">Website</a>` : ""}
        </div>
      </div>`;
    L.marker([c.lat, c.lng], { icon })
      .addTo(leafletMap)
      .bindPopup(popup, { maxWidth: 260 })
      .bindTooltip(c.name, { permanent: false, direction: "top" });
  });
}

// ── View toggle ───────────────────────────────────────────────────────────────
function showView(v) {
  const calView = document.getElementById("calendar-view");
  const mapView = document.getElementById("map-view");
  document.getElementById("viewCalBtn").classList.toggle("active", v === "calendar");
  document.getElementById("viewMapBtn").classList.toggle("active", v === "map");

  if (v === "map") {
    calView.style.display = "none";
    mapView.style.display = "flex";
    mapView.style.flex    = "1";
    setTimeout(() => {
      if (!leafletMap) {
        fetch("/api/courses").then(r => r.json()).then(courses => {
          initMap(courses);
          leafletMap.invalidateSize();
        });
      } else {
        leafletMap.invalidateSize();
      }
    }, 50);
  } else {
    calView.style.display = "block";
    mapView.style.display = "none";
  }
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadEvents() {
  try {
    const res = await fetch("/api/events");
    allEvents = await res.json();
    renderEventList(allEvents);
    pushToCalendar(allEvents);
    document.getElementById("viewStatus").textContent = `${allEvents.length} events`;
  } catch(e) { toast("Failed to load events.", true); }
}

async function loadUpcoming() {
  try {
    const res = await fetch("/api/upcoming");
    allUpcoming = await res.json();
    renderUpcomingList(allUpcoming);
  } catch(e) { console.error(e); }
}

async function loadCourses() {
  try {
    const res = await fetch("/api/courses");
    const courses = await res.json();
    renderCoursesList(courses);
    const dl = document.getElementById("courseSuggestions");
    dl.innerHTML = courses.map(c => `<option value="${esc(c.name)}">`).join("");
  } catch(e) { console.error(e); }
}

function pushToCalendar(events) {
  calendar.removeAllEvents();
  events.forEach(ev => {
    calendar.addEvent({
      id: String(ev.id),
      title: ev.title,
      date: ev.date,
      extendedProps: ev,
    });
  });
}

// ── Render helpers ────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return "Date TBD";
  return new Date(iso + "T12:00:00").toLocaleDateString("en-US",
    { weekday: "short", month: "short", day: "numeric", year: "numeric" });
}

function fmtDateShort(iso) {
  if (!iso) return "TBD";
  return new Date(iso + "T12:00:00")
    .toLocaleDateString("en-US", { month: "short", day: "numeric" })
    .toUpperCase();
}

function sourceTag(ev) {
  if (ev.source === "manual")                                             return `<span class="tag tag-manual">Manual</span>`;
  if (ev.source === "3lakes_calendar" || ev.source === "3lakes_scrape")  return `<span class="tag tag-3lakes">3 Lakes</span>`;
  if (ev.source === "pgt")                                               return `<span class="tag tag-pgt">PGT Tour</span>`;
  if (ev.source === "eventbrite")                                        return `<span class="tag tag-eventbrite">Eventbrite</span>`;
  return `<span class="tag tag-butlers">Butler's</span>`;
}

function renderEventList(events) {
  const el = document.getElementById("eventList");
  const sorted = [...events].sort((a, b) => (a.date || "9999").localeCompare(b.date || "9999"));
  if (!sorted.length) {
    el.innerHTML = `<div class="empty-state">No events. Hit <strong>Refresh</strong> or <strong>Add Event</strong>.</div>`;
    return;
  }
  el.innerHTML = sorted.map(ev => {
    const bookUrl = bookingUrl(ev.tee_time_url, ev.date);
    const showFallback = ev.tee_time_url && needsFallback(ev.tee_time_url);
    return `
    <div class="event-row" onclick='showModal(${JSON.stringify(ev).replace(/'/g,"&#39;")},false)'>
      <div class="event-row-date">${fmtDateShort(ev.date)}${ev.time ? " &middot; " + esc(ev.time) : ""}</div>
      <div class="event-row-title">${esc(ev.title)}</div>
      <div class="event-row-course">${esc(ev.course)}</div>
      <div class="event-row-actions">
        ${sourceTag(ev)}
        ${bookUrl ? `<a href="${esc(bookUrl)}" target="_blank" class="btn btn-sm btn-green" onclick="event.stopPropagation()">Book</a>` : ""}
        ${showFallback ? `<a href="${esc(golfNowSearch(ev.date))}" target="_blank" class="btn btn-sm btn-ghost" onclick="event.stopPropagation()" title="Search GolfNow near ${userZip}">GolfNow</a>` : ""}
      </div>
    </div>`;
  }).join("");
}

function renderUpcomingList(events) {
  const el = document.getElementById("upcomingList");
  const sorted = [...events].sort((a, b) => (a.date || "9999").localeCompare(b.date || "9999"));
  if (!sorted.length) {
    el.innerHTML = `<div class="empty-state">No upcoming events found.</div>`;
    return;
  }
  el.innerHTML =
    `<div style="padding:10px 14px 9px;border-bottom:1px solid var(--border);">
       <p style="font-size:10px;color:var(--muted);line-height:1.55;letter-spacing:0.01em;">
         Community &amp; charity outings from Eventbrite and Pittsburgh Sports League.
         Register via the event link.
       </p>
     </div>` +
    sorted.map(ev => `
    <div class="event-row" onclick='showModal(${JSON.stringify(ev).replace(/'/g,"&#39;")},true)'>
      <div class="event-row-date">${fmtDateShort(ev.date)}${ev.time ? " &middot; " + esc(ev.time) : ""}</div>
      <div class="event-row-title">${esc(ev.title)}</div>
      <div class="event-row-course">${esc(ev.course)}</div>
      <div class="event-row-actions">
        ${sourceTag(ev)}
        ${ev.event_url ? `<a href="${esc(ev.event_url)}" target="_blank" class="btn btn-sm btn-dark" onclick="event.stopPropagation()">Register</a>` : ""}
      </div>
    </div>`).join("");
}

function renderCoursesList(courses) {
  document.getElementById("coursesList").innerHTML = courses.map(c => `
    <div class="course-row">
      <h4>${esc(c.name)}</h4>
      <div class="course-meta">${esc(c.address)}${c.phone ? " &middot; " + esc(c.phone) : ""}</div>
      <div class="course-actions">
        ${c.tee_time_url ? `<a href="${esc(c.tee_time_url)}" target="_blank" class="btn btn-sm btn-green">Book Tee Time</a>` : ""}
        ${c.website && c.website !== c.tee_time_url ? `<a href="${esc(c.website)}" target="_blank" class="btn btn-sm btn-ghost">Website</a>` : ""}
      </div>
    </div>`).join("");
}

// ── Filter ────────────────────────────────────────────────────────────────────
function filterEvents() {
  const q = document.getElementById("evSearch").value.toLowerCase();
  const f = allEvents.filter(e =>
    !q || (e.title || "").toLowerCase().includes(q) || (e.course || "").toLowerCase().includes(q)
  );
  renderEventList(f);
  pushToCalendar(f);
}

function filterUpcoming() {
  const q = document.getElementById("upSearch").value.toLowerCase();
  renderUpcomingList(allUpcoming.filter(e =>
    !q || (e.title || "").toLowerCase().includes(q) || (e.course || "").toLowerCase().includes(q)
  ));
}

// ── Scrape ────────────────────────────────────────────────────────────────────
async function runScrape() {
  const btn = document.getElementById("scrapeBtn");
  btn.disabled = true;
  btn.textContent = "Refreshing\u2026";
  try {
    const res = await fetch("/api/scrape", { method: "POST" });
    const d   = await res.json();
    if (d.ok) {
      await loadEvents();
      toast(`${d.count} events loaded.`);
    } else {
      toast("Refresh failed: " + d.error, true);
    }
  } catch(e) { toast("Network error.", true); }
  finally { btn.disabled = false; btn.textContent = "\u8635 Refresh"; }
}

// ── Add event ─────────────────────────────────────────────────────────────────
async function submitEvent(e) {
  e.preventDefault();
  const data = {};
  new FormData(e.target).forEach((v, k) => { data[k] = v; });
  const res  = await fetch("/api/events", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data),
  });
  const json = await res.json();
  if (json.ok) {
    e.target.reset();
    e.target.querySelector('[name="date"]').value = new Date().toISOString().split("T")[0];
    await loadEvents();
    openTab("events");
    toast("Event added.");
  } else {
    toast("Error: " + json.error, true);
  }
}

async function deleteEvent(id) {
  if (!confirm("Delete this event?")) return;
  await fetch(`/api/events/${id}`, { method: "DELETE" });
  closeModal();
  await loadEvents();
  toast("Deleted.");
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(ev, isUpcoming) {
  document.getElementById("m-eyebrow").textContent = ev.course;
  document.getElementById("m-title").textContent   = ev.title;
  document.getElementById("m-meta").textContent    = fmtDate(ev.date) + (ev.time ? " \u00b7 " + ev.time : "");
  document.getElementById("m-desc").textContent    = ev.description || "";

  const note = document.getElementById("m-note");
  if (isUpcoming) {
    note.textContent = "This event is from a public listing. Tee times are not directly bookable \u2014 use the Register link to sign up.";
    note.style.display = "block";
  } else {
    note.style.display = "none";
  }

  const act = document.getElementById("m-actions");
  act.innerHTML = "";

  if (isUpcoming && ev.event_url) {
    act.innerHTML += `<a href="${esc(ev.event_url)}" target="_blank" class="btn btn-dark">Register / Info</a>`;
  }
  if (!isUpcoming && ev.tee_time_url) {
    const bUrl = bookingUrl(ev.tee_time_url, ev.date);
    act.innerHTML += `<a href="${esc(bUrl)}" target="_blank" class="btn btn-green">Book Tee Time</a>`;
    if (needsFallback(ev.tee_time_url)) {
      act.innerHTML += `<a href="${esc(golfNowSearch(ev.date))}" target="_blank" class="btn btn-ghost" title="Search available tee times near ${userZip}">Search GolfNow</a>`;
    }
  } else if (!isUpcoming && !ev.tee_time_url) {
    act.innerHTML += `<a href="${esc(golfNowSearch(ev.date))}" target="_blank" class="btn btn-green">Find Tee Times</a>`;
  }
  if (!isUpcoming && ev.event_url) {
    act.innerHTML += `<a href="${esc(ev.event_url)}" target="_blank" class="btn btn-ghost">Event Details</a>`;
  }
  if (ev.source === "manual" && ev.id) {
    const del = document.createElement("button");
    del.className   = "btn btn-danger";
    del.textContent = "Delete";
    del.onclick     = () => deleteEvent(ev.id);
    act.appendChild(del);
  }

  document.getElementById("eventModal").classList.add("open");
}

function closeModal()    { document.getElementById("eventModal").classList.remove("open"); }
function closeModalBg(e) { if (e.target === document.getElementById("eventModal")) closeModal(); }

// ── Tabs ──────────────────────────────────────────────────────────────────────
function openTab(name) {
  const names = ["events", "upcoming", "courses", "add"];
  document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", names[i] === name));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

let _toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById("toast");
  el.textContent    = msg;
  el.style.background = isErr ? "#a02020" : "#0d0d0b";
  el.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
}
</script>
